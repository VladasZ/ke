- global:
  hi: echo Hello world
  date: date

- folder: ~/dev/apps/ke
  build: cargo build
  release: cargo build --release
  test: cargo test
  check: |
    cargo check
    cargo clippy
  fmt: cargo fmt
  clean: cargo clean
  run: cargo run
  hello: echo Hello world

- folder: ~/dev/apps/other-project
  install: npm install
  dev: npm run dev
  build: npm run build
  test: npm test
  lint: |
    npm run lint
    npm run typecheck
  clean: rm -rf node_modules dist
